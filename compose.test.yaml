services:
  postgres-test:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhaohe_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhaohe_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_test_data:
